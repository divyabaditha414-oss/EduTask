<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Student Portal{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            min-height: 100vh;
            background: #212529;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px;
            display: block;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .content {
            padding: 20px;
        }

        footer {
            background: #212529;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <button class="btn btn-outline-light d-md-none" data-bs-toggle="collapse" data-bs-target="#sidebar">
        ☰
    </button>
    <span class="navbar-brand ms-2">EduTrack</span>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div id="sidebar" class="col-lg-2 col-md-3 sidebar collapse d-md-block p-3">
            <h5 class="text-white text-center mb-4">Menu</h5>
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/students"><i class="bi bi-table"></i> Manage Students</a>
            <a href="/add"><i class="bi bi-person-plus"></i> Add Student</a>
            <a href="/reports"><i class="bi bi-graph-up"></i> Reports</a>
            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <!-- CONTENT -->
        <div class="col-lg-10 col-md-9 col-12 content">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

<footer>
    © 2026 Student Management System | Developed by Divya
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
