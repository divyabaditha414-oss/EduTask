<!DOCTYPE html>
<html>
<head>
    <title>Welcome - EduTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 55px;
            font-weight: 700;
        }

        .hero p {
            font-size: 20px;
            margin-top: 15px;
            opacity: 0.9;
        }

        .btn-custom {
            margin-top: 30px;
            padding: 12px 35px;
            font-size: 18px;
            border-radius: 50px;
            transition: 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .brand {
            position: absolute;
            top: 20px;
            left: 40px;
            font-size: 24px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="brand">
    🎓 EduTrack
</div>

<div class="hero">
    <div>
        <h1>Welcome to EduTrack</h1>
        <p>Modern Student Management System</p>

        <a href="/login" class="btn btn-primary btn-lg btn-custom">
            Login to Continue
        <a href="/register" class="btn btn-outline-light btn-lg btn-custom mt-3">
    Create Account
</a>    
        </a>
    </div>
</div>

</body>
</html>
